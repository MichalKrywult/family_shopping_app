<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Boards</title>
    <link rel="manifest" href="public/manifest.json">
    <meta name="theme-color" content="#28a745">
    <link rel="icon" type="image/x-icon" href="public/assets/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body>

    <div class="bottom-nav" id="bottomNav">
        <button onclick="switchMobileView('sidebar')" id="navBtnSidebar" class="nav-item active">📋 Boards</button>
        <button onclick="switchMobileView('main')" id="navBtnMain" class="nav-item">🛒 Active List</button>
    </div>

    <div class="sidebar">
        <h3>📋 Boards</h3>
        <div id="listsDashboard" style="flex: 1; overflow-y: auto;"></div>
        
        <div id="createListForm">
            <input type="text" id="listName" class="input-field" placeholder="New board name..." style="margin-bottom: 8px;">
            <button onclick="handleCreateList()" style="width: 100%;">+ Create List</button>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            
            <div id="blankState" class="card" style="text-align: center; color: var(--muted);">
                <h2>Welcome to Shopping Boards!</h2>
                <p>Select a board from the sidebar or create a new one to start shopping.</p>
            </div>

            <div class="card" id="currentListCard" style="display:none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2 id="currentListName" style="margin: 0;">My List</h2>
                    <button id="deleteListBtn" class="delete-btn">Delete Board</button>
                </div>
                
                <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <input type="text" id="itemName" class="input-field" placeholder="Type..." style="flex: 3;">
                    <input type="number" id="itemQty" class="input-field" value="1" min="1" style="flex: 1;">
                    <button onclick="handleAddItem()" style="flex: 1;">Add</button>
                </div>
                <div id="itemsContainer"></div>
            </div>

        </div>
    </div>

    <script type="module">
        import * as shoppingService from './src/shopping/shopping.js';

        async function renderListsDashboard() {
            const lists = await shoppingService.getAllLists();
            const container = document.getElementById('listsDashboard');
            container.innerHTML = '';

            if (!lists || lists.length === 0) {
                container.innerHTML = '<p style="color: var(--muted); font-style: italic; font-size: 13px;">No boards found.</p>';
                return;
            }

            lists.forEach(list => {
                const button = document.createElement('button');
                button.className = 'list-selector';
                button.innerText = `📦 ${list.name}`;
                button.onclick = () => window.handleSelectList(list.id, list.name);
                container.appendChild(button);
            });
        }

        async function renderItems() {
            const listData = await shoppingService.loadListItems();
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            if (!listData || !listData.items) return;

            listData.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                const isChecked = item.is_done ? 'checked' : '';
                
                div.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px; cursor: pointer;" onclick="window.handleToggleItem(${item.id})">
                        <input type="checkbox" ${isChecked} style="cursor: pointer; width: 16px; height: 16px; pointer-events: none;">
                        <span class="${item.is_done ? 'done' : ''}" style="font-size: 15px;">
                            ${item.name} <strong style="color: var(--muted); font-size: 13px;">x${item.quantity}</strong>
                        </span>
                    </div>
                    <button class="delete-btn" onclick="window.handleDeleteItem(${item.id})">X</button>
                `;
                container.appendChild(div);
            });
        }

        window.handleSelectList = async (listId, listName) => {
            shoppingService.setCurrentListId(listId);
            document.getElementById('blankState').style.display = 'none';
            document.getElementById('currentListName').innerText = listName;
            document.getElementById('currentListCard').style.display = 'block';
            
            const deleteBtn = document.getElementById('deleteListBtn');
            deleteBtn.onclick = async () => {
                if (!confirm(`Are you sure you want to delete board "${listName}"?`)) return;
                await shoppingService.deleteList(listId);
                
                document.getElementById('currentListCard').style.display = 'none';
                document.getElementById('blankState').style.display = 'block';
                shoppingService.setCurrentListId(null);
                await renderListsDashboard();
                
                if (window.innerWidth <= 768) {
                    window.switchMobileView('sidebar');
                }
            };

            await renderItems();

            if (window.innerWidth <= 768) {
                window.switchMobileView('main');
            }
        };

        window.handleCreateList = async () => {
            const name = document.getElementById('listName').value;
            if (!name) return alert('Enter a board name!');
            
            const list = await shoppingService.createNewList(name);
            document.getElementById('listName').value = '';
            
            await renderListsDashboard();
            await window.handleSelectList(list.id, list.name);
        };

        window.handleAddItem = async () => {
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value;
            if (!name) return alert('Enter a product name!');

            await shoppingService.addItemToCurrentList(name, parseInt(qty));
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '1';
            await renderItems();
        };

        window.handleToggleItem = async (itemId) => {
            await shoppingService.toggleItemDone(itemId);
            await renderItems();
        };

        window.handleDeleteItem = async (itemId) => {
            if (!confirm('Delete this item?')) return;
            await shoppingService.deleteItem(itemId);
            await renderItems();
        };

        window.switchMobileView = (view) => {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');
            const btnSidebar = document.getElementById('navBtnSidebar');
            const btnMain = document.getElementById('navBtnMain');

            if (view === 'sidebar') {
                sidebar.classList.add('active-mobile');
                mainContent.classList.remove('active-mobile');
                btnSidebar.classList.add('active');
                btnMain.classList.remove('active');
            } else {
                sidebar.classList.remove('active-mobile');
                mainContent.classList.add('active-mobile');
                btnSidebar.classList.remove('active');
                btnMain.classList.add('active');
            }
        };

        async function init() {
            await renderListsDashboard();
            if (window.innerWidth <= 768) {
                window.switchMobileView('sidebar');
            }
        }

        init();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('public/sw.js')
                    .then(reg => console.log('PWA Service Worker registered!'))
                    .catch(err => console.error('PWA Error:', err));
            });
        }
    </script>
</body>
</html>
